name: Déployer sur GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le site
        uses: actions/checkout@v4

      - name: Configurer GitHub Pages
        uses: actions/configure-pages@v5

      - name: Préparer les fichiers statiques
        run: |
          mkdir _site
          cp index.html game.js styles.css _site/
          cp -R assets _site/assets
          touch _site/.nojekyll

      - name: Créer l’artefact Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Publier le site
        id: deployment
        uses: actions/deploy-pages@v4
